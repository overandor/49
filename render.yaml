services:
  - type: web
    name: overworker-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OVERWORKER_ENV
        value: production
      - key: OVERWORKER_DISABLE_REMOTE_LLM
        value: false
